  <canvas id="life-canvas" style="width:100%;height:240px;display:block;background:#0f172a;"></canvas>
</div>

<script>
  (function () {
    const cvs = document.getElementById('life-canvas');
    const ctx = cvs.getContext('2d');
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    let cell = 5; // 单元格边长（像素）
    let cols = 0, rows = 0;
    let grid = [], next = [];
    let last = 0, interval = 80; // 每帧间隔（ms）

    function makeGrid(w, h) {
      const g = new Array(h);
      for (let y = 0; y < h; y++) g[y] = new Uint8Array(w);
      return g;
    }

    function resize() {
      const w = cvs.clientWidth, h = cvs.clientHeight;
      cvs.width = w * dpr;
      cvs.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 适配高 DPI
      cols = Math.floor(w / cell);
      rows = Math.floor(h / cell);
      grid = makeGrid(cols, rows);
      seedRandom(0); // 初始随机播种
      draw();
    }

    function seedRandom(p) {
      for (let y = 0; y < rows; y++)
        for (let x = 0; x < cols; x++)
          grid[y][x] = Math.random() < p ? 1 : 0;
    }

    function step() {
      next = makeGrid(cols, rows);
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          let n = 0;
          for (let dy = -1; dy <= 1; dy++)
            for (let dx = -1; dx <= 1; dx++)
              if (dx || dy)
                n += grid[(y + dy + rows) % rows][(x + dx + cols) % cols]; // 环形边界
          const alive = grid[y][x];
          next[y][x] = (n === 3 || (alive && n === 2)) ? 1 : 0;
        }
      }
      grid = next;
    }

    function draw() {
      ctx.clearRect(0, 0, cvs.clientWidth, cvs.clientHeight);

      // 可选网格淡淡显示（注释掉可去除）
      // ctx.strokeStyle = 'rgba(148,163,184,.12)';
      // for (let x = 0; x <= cols; x++) {
      //   ctx.beginPath();
      //   ctx.moveTo(x*cell,0);
      //   ctx.lineTo(x*cell,rows*cell);
      //   ctx.stroke();
      // }
      // for (let y = 0; y <= rows; y++) {
      //   ctx.beginPath();
      //   ctx.moveTo(0,y*cell);
      //   ctx.lineTo(cols*cell,y*cell);
      //   ctx.stroke();
      // }

      ctx.fillStyle = '#38bdf8'; // 活细胞颜色（天蓝）
      for (let y = 0; y < rows; y++)
        for (let x = 0; x < cols; x++)
          if (grid[y][x])
            ctx.fillRect(x * cell, y * cell, cell, cell);
    }

    function loop(t) {
      if (t - last > interval) {
        step();
        draw();
        last = t;
      }
      requestAnimationFrame(loop);
    }

    // 点击播种滑翔机（更容易产生动态效果）
    cvs.addEventListener('click', (e) => {
      const r = cvs.getBoundingClientRect();
      const x = Math.floor((e.clientX - r.left) / cell);
      const y = Math.floor((e.clientY - r.top) / cell);
      const glider = [[1,0],[2,1],[0,2],[1,2],[2,2]];
      for (const [dx, dy] of glider) {
        const px = (x + dx + cols) % cols, py = (y + dy + rows) % rows;
        grid[py][px] = 1;
      }
      draw();
    });

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(loop);
  })();
</script>

<script>
  (function() {
    // 容器与界面元素
    const mount = document.getElementById('mini-game-embed');
    if (!mount) return;

    mount.innerHTML = `
      <div id="mg-root">
        <canvas id="mg-canvas" width="800" height="500"></canvas>
        <div id="mg-hud">
          <div class="mg-badge">分数: <span id="mg-score">0</span></div>
          <div class="mg-badge">生命: <span id="mg-lives">3</span></div>
          <div class="mg-badge">第一下横第二下竖 碰到就掉血</div>
          <button id="mg-flip" title="翻转所有单位移动方向（移动端点击）">将大局逆转吧</button>
        </div>
      </div>
      <div id="mg-overlay">
        <div style="text-align:center;">
          <div style="font-size:28px; margin-bottom:8px;">你挂了</div>
          <div id="mg-final" style="margin-bottom:12px;"></div>
          <button id="mg-reset">你好菜 重新试试吧</button>
        </div>
      </div>
      <div id="mg-toast">噜！</div>
    `;

    // 元素
    const canvas = document.getElementById('mg-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('mg-score');
    const livesEl = document.getElementById('mg-lives');
    const overlay = document.getElementById('mg-overlay');
    const finalEl = document.getElementById('mg-final');
    const resetBtn = document.getElementById('mg-reset');
    const toast = document.getElementById('mg-toast');
    const flipBtn = document.getElementById('mg-flip');

    // 游戏状态
    let W = canvas.width, H = canvas.height;
    let clickCount = 0;
    let score = 0;
    let lives = 3;
    let gameOver = false;
    const UNIT_R = 12; // 改为 let，便于翻转影响后续放置的单位
    let H_SPEED = 2.2;
    let V_SPEED = 2.2;
    const horizontal = []; // {x,y,r,vx,vy,id}
    const vertical = [];

    // 点击放置
    canvas.addEventListener('click', (ev) => {
      if (gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const x = ev.clientX - rect.left;
      const y = ev.clientY - rect.top;
      clickCount++;
      score++;
      scoreEl.textContent = score;
      if (clickCount % 2 === 1) {
        horizontal.push({ x, y, r: UNIT_R, vx: H_SPEED, vy: 0, id: Math.random().toString(36).slice(2) });
      } else {
        vertical.push({ x, y, r: UNIT_R, vx: 0, vy: V_SPEED, id: Math.random().toString(36).slice(2) });
      }
    });

    // 统一的翻转函数，按钮和右键都调用
    function flipAllDirections(showText = true) {
      if (gameOver) return;
      // 翻转全局速度（影响新放置的单位）
      H_SPEED = -H_SPEED;
      V_SPEED = -V_SPEED;
      // 翻转现有单位的速度
      for (const h of horizontal) h.vx = -h.vx;
      for (const v of vertical) v.vy = -v.vy;
      if (showText) showToast('噜！');
    }

    // 右键（contextmenu）翻转
    canvas.addEventListener('contextmenu', (ev) => {
      ev.preventDefault(); // 防止浏览器默认菜单
      flipAllDirections();
    });

    // 移动端/触摸可点击的翻转按钮
    flipBtn.addEventListener('click', (ev) => {
      flipAllDirections();
    });

    function wrap(u) {
      if (u.x < -u.r) u.x = W + u.r;
      if (u.x > W + u.r) u.x = -u.r;
      if (u.y < -u.r) u.y = H + u.r;
      if (u.y > H + u.r) u.y = -u.r;
    }

    function update() {
      // 移动
      for (const h of horizontal) {
        h.x += h.vx;
        wrap(h);
      }
      for (const v of vertical) {
        v.y += v.vy;
        wrap(v);
      }

      // 碰撞检测：确保每个单位每帧只算一次碰撞（用于减少生命）
      const usedH = new Array(horizontal.length).fill(false);
      const usedV = new Array(vertical.length).fill(false);
      const pairs = []; // store [hi, vi]

      for (let i = 0; i < horizontal.length; i++) {
        if (usedH[i]) continue;
        const h = horizontal[i];
        for (let j = 0; j < vertical.length; j++) {
          if (usedV[j]) continue;
          const v = vertical[j];
          const dx = h.x - v.x;
          const dy = h.y - v.y;
          const rsum = h.r + v.r;
          if (dx * dx + dy * dy <= rsum * rsum) {
            usedH[i] = true;
            usedV[j] = true;
            pairs.push([i, j]);
            break; // h 已被使用，不继续匹配其它 v
          }
        }
      }

      if (pairs.length) {
        // 按索引从后往前删除，这样不会改变未删除元素的索引追踪
        const removeHidx = pairs.map(p => p[0]).sort((a, b) => b - a);
        const removeVidx = pairs.map(p => p[1]).sort((a, b) => b - a);
        for (const idx of removeHidx) horizontal.splice(idx, 1);
        for (const idx of removeVidx) vertical.splice(idx, 1);

        lives -= pairs.length;
        if (lives < 0) lives = 0;
        livesEl.textContent = lives;
        if (lives <= 0) doGameOver();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // 背景
      ctx.fillStyle = '#0b0b0b';
      ctx.fillRect(0, 0, W, H);

      // 画横向单位：红色圆
      for (const h of horizontal) {
        ctx.beginPath();
        ctx.fillStyle = '#ff6b6b';
        ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
        ctx.fill();
      }

      // 画纵向单位：蓝色方块
      for (const v of vertical) {
        ctx.save();
        ctx.translate(v.x, v.y);
        ctx.fillStyle = '#5eead4';
        ctx.fillRect(-v.r, -v.r, v.r * 2, v.r * 2);
        ctx.restore();
      }
    }

    function loop() {
      if (!gameOver) {
        update();
        draw();
      }
      requestAnimationFrame(loop);
    }

    function doGameOver() {
      gameOver = true;
      finalEl.textContent = '你的分数是 ' + score;
      overlay.classList.add('mg-show');
      overlay.style.visibility = 'visible';
    }

    resetBtn.addEventListener('click', resetGame);

    function resetGame() {
      // 恢复初始状态
      clickCount = 0;
      score = 0;
      lives = 3;
      gameOver = false;
      horizontal.length = 0;
      vertical.length = 0;

      // 恢复默认速度方向（如果你希望保留翻转状态，可以注释下面两行）
      H_SPEED = Math.abs(H_SPEED);
      V_SPEED = Math.abs(V_SPEED);

      scoreEl.textContent = score;
      livesEl.textContent = lives;
      overlay.classList.remove('mg-show');
      overlay.style.visibility = 'hidden';
    }

    // 隐藏彩蛋检测（上上下下左右左右baba）
    const konami = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a','b','a'];
    let keyBuf = [];
    window.addEventListener('keydown', (ev) => {
      const k = (ev.key || '').toString();
      keyBuf.push(k.length === 1 ? k.toLowerCase() : k); // 字母转小写，方向键保留原名
      if (keyBuf.length > konami.length) keyBuf.shift();
      if (keyBuf.length === konami.length) {
        // 比较
        let match = true;
        for (let i = 0; i < konami.length; i++) {
          const expected = konami[i];
          const actual = keyBuf[i];
          if (expected.length === 1) { // letter
            if (actual !== expected) {
              match = false;
              break;
            }
          } else {
            if (actual !== expected) {
              match = false;
              break;
            }
          }
        }
        if (match) {
          lives += 30;
          livesEl.textContent = lives;
          // 显示短暂提示
          showToast('+30 生命！');
          keyBuf = []; // 防止重复触发
        }
      }
    });

    // 显示短暂提示的通用函数
    let toastTimer = null;
    function showToast(text) {
      toast.textContent = text;
      toast.style.display = 'block';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.style.display = 'none';
        toastTimer = null;
      }, 2000);
    }

    // 启动循环
    loop();

    // 若页面需要响应尺寸变化，可在此调整 canvas（当前默认为固定尺寸）
    // window.addEventListener('resize', () => { /* 如需响应式可修改 canvas.width/height */ });
  })();
</script>

<script>
  /**
   * 班次时间：
   * 早：07:30 - 14:00
   * 午：14:00 - 21:00
   * 晚：21:00 - 次日 07:30
   */

  const shiftTimeText = {
    '早': '07:30 - 14:00',
    '午': '14:00 - 21:00',
    '晚': '21:00 - 次日 07:30',
    '白': '11:00 - 23:00',
    '补': '07:00 - 11:00',
    '休': '嚯嚯嚯 夸脏噢！'
  };

  const shiftConfig = {
    '我': {
      shifts: ['午', '午', '早', '早', '晚', '晚', '休', '休'],
      offset: 6
    },
    '🌲': {
      shifts: ['白', '补', '休', '休', '白', '白'],
      offset: 6
    },
    '🐓': {
      shifts: ['晚', '晚', '休', '休', '午', '午', '早', '早'],
      offset: 6
    },
    '0': {
      shifts: ['休', '休', '午', '午', '早', '早', '晚', '晚'],
      offset: 6
    }
  };

  const FIRST_DAY_NOTE_TEXT = '特殊备注：白天要睡到下午三四点。';

  // false 表示只在晚班第一天显示备注
  // true 表示任何班次的第一天都显示备注
  const NOTE_FOR_ANY_SHIFT_FIRST_DAY = false;

  let current = new Date();
  let viewYear = current.getFullYear();
  let viewMonth = current.getMonth();
  let selectedDate = new Date();

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function formatDate(date) {
    return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
  }

  function sameDate(a, b) {
    return a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
  }

  function mod(n, m) {
    return ((n % m) + m) % m;
  }

  function daysSinceStart(year, month, day, date) {
    const startUTC = Date.UTC(year, month - 1, day);
    const dateUTC = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
    return Math.floor((dateUTC - startUTC) / 86400000);
  }

  function getDaysByDate(date) {
    return daysSinceStart(2023, 11, 21, date);
  }

  function getShiftFor(name, days) {
    const config = shiftConfig[name];
    const index = mod(days + config.offset, config.shifts.length);
    const shift = config.shifts[index];

    return {
      shift: shift,
      time: shiftTimeText[shift] || ''
    };
  }

  function isFirstDayOfCurrentShift(name, days) {
    const todayShift = getShiftFor(name, days).shift;
    const yesterdayShift = getShiftFor(name, days - 1).shift;
    return todayShift !== yesterdayShift;
  }

  function getFirstDayNote(shift, isFirstDay) {
    if (!isFirstDay) return '';

    if (NOTE_FOR_ANY_SHIFT_FIRST_DAY) {
      return FIRST_DAY_NOTE_TEXT;
    }

    return shift === '晚' ? FIRST_DAY_NOTE_TEXT : '';
  }

  function renderCalendar() {
    const daysEl = document.getElementById('days');
    const monthTitle = document.getElementById('monthTitle');

    daysEl.innerHTML = '';
    monthTitle.innerText = viewYear + '年 ' + (viewMonth + 1) + '月';

    const firstDay = new Date(viewYear, viewMonth, 1);
    const firstWeek = firstDay.getDay() || 7;
    const startDate = new Date(viewYear, viewMonth, 1 - firstWeek + 1);

    for (let i = 0; i < 42; i++) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + i);

      const days = getDaysByDate(date);
      const div = document.createElement('div');

      div.className = 'day';

      if (date.getMonth() !== viewMonth) {
        div.classList.add('other');
      }

      if (sameDate(date, new Date())) {
        div.classList.add('today');
      }

      if (sameDate(date, selectedDate)) {
        div.classList.add('selected');
      }

      let html = '<div class="date">' + date.getDate() + '</div>';

      Object.keys(shiftConfig).forEach(name => {
        const info = getShiftFor(name, days);
        html += '<span class="tag ' + info.shift + '">' + name + '：' + info.shift + '</span>';
      });

      div.innerHTML = html;

      div.onclick = function () {
        selectedDate = new Date(date);
        renderCalendar();
        renderDetail();
      };

      daysEl.appendChild(div);
    }
  }

  function renderDetail() {
    const detail = document.getElementById('detail');
    const days = getDaysByDate(selectedDate);

    let html = '<h3>' + formatDate(selectedDate) + ' 排班</h3>';

    Object.keys(shiftConfig).forEach(name => {
      const info = getShiftFor(name, days);
      const isFirstDay = isFirstDayOfCurrentShift(name, days);
      const note = getFirstDayNote(info.shift, isFirstDay);

      html += `
        <div class="item">
          <div class="name">${name}</div>
          <div>
            <span class="tag ${info.shift}">${info.shift}</span>
            ${info.time}
          </div>
          ${note ? `<div class="note">${note}</div>` : ''}
        </div>
      `;
    });

    detail.innerHTML = html;
  }

  function prevMonth() {
    viewMonth--;

    if (viewMonth < 0) {
      viewMonth = 11;
      viewYear--;
    }

    renderCalendar();
  }

  function nextMonth() {
    viewMonth++;

    if (viewMonth > 11) {
      viewMonth = 0;
      viewYear++;
    }

    renderCalendar();
  }

  function goToday() {
    const today = new Date();

    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    selectedDate = today;

    renderCalendar();
    renderDetail();
  }

  renderCalendar();
  renderDetail();
</script>
